<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Lodicka — Boat Adventure!</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⛵</text></svg>">
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <canvas id="game"></canvas>
    <div id="hud" class="hidden">
      <div class="hud-side hud-left">
        <div class="player-tag">P1</div>
        <div class="lives" id="lives-1"></div>
        <div class="score" id="score-1">0</div>
        <div class="speed" id="speed-1">🐌</div>
      </div>
      <div class="hud-side hud-right">
        <div class="player-tag">P2</div>
        <div class="lives" id="lives-2"></div>
        <div class="score" id="score-2">0</div>
        <div class="speed" id="speed-2">🐌</div>
      </div>
    </div>
    <div id="effect-1" class="effect-label hidden"></div>
    <div id="effect-2" class="effect-label hidden"></div>
    <div id="start-screen">
      <div class="title">⛵ LODICKA ⛵</div>
      <div class="subtitle">Boat Adventure — 2 Players!</div>
      <button id="start-btn">▶ PLAY!</button>
      <div class="instructions">
        <p><b>P1:</b> A — D keys</p>
        <p><b>P2:</b> ⬅️ ➡️ Arrow keys</p>
        <p>💎 Treasure · 🚩 Gates · 🌊 Jump waves</p>
        <p>🏁 First to <b>20 000</b> reaches the PORT!</p>
      </div>
    </div>
    <div id="game-over-screen" class="hidden">
      <div class="title">🌊 SPLASH! 🌊</div>
      <div id="winner"></div>
      <div id="final-scores"></div>
      <div id="high-score"></div>
      <button id="restart-btn">🔄 Play Again!</button>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
